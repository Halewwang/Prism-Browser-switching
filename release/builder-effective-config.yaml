directories:
  output: release
  buildResources: build
appId: com.prism.app
productName: Prism
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - package.json
      - index.html
mac:
  category: public.app-category.utilities
  target:
    - dmg
  icon: build/icon.png
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLSchemes:
          - http
          - https
        CFBundleURLName: Web URL Handler
        CFBundleTypeRole: Viewer
dmg:
  title: Install Prism
  contents:
    - x: 130
      'y': 180
    - x: 410
      'y': 180
      type: link
      path: /Applications
electronVersion: 29.4.6
